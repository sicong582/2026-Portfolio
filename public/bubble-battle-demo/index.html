<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bubble Battle — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fafafa;
        --text: #18181b;
        --muted: #71717a;
        --border: #e4e4e7;
        --accent: #2563eb;
        --accent-soft: #dbeafe;
        --radius: 20px;
        --font: "Inter", system-ui, sans-serif;
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--text);
        background: radial-gradient(900px 420px at 50% -120px, var(--accent-soft), transparent 65%), var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 16px 32px;
      }
      .shell {
        width: min(420px, 100%);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 40px rgba(24, 24, 27, 0.08);
        overflow: hidden;
      }
      .head {
        padding: 20px 20px 12px;
        text-align: center;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }
      p.sub {
        margin: 0;
        font-size: 0.875rem;
        color: var(--muted);
        line-height: 1.45;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        background: #f4f4f5;
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--muted);
      }
      .hud strong {
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }
      #game {
        display: block;
        width: 100%;
        height: min(420px, 72vh);
        touch-action: none;
        cursor: crosshair;
        background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      }
      .foot {
        padding: 12px 16px 16px;
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="head">
        <h1>Bubble Battle</h1>
        <p class="sub">Tap or click bubbles before they escape. Replace this file with your shipped build when ready.</p>
      </div>
      <div class="hud">
        <span>Score <strong id="score">0</strong></span>
        <span>Missed <strong id="missed">0</strong></span>
      </div>
      <canvas id="game" width="400" height="420" aria-label="Bubble popping demo"></canvas>
      <div class="foot">Portfolio prototype · same-origin demo</div>
    </div>
    <script>
      (function () {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const missedEl = document.getElementById("missed");
        const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function resize() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const rect = canvas.getBoundingClientRect();
          canvas.width = Math.floor(rect.width * dpr);
          canvas.height = Math.floor(rect.height * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener("resize", resize);

        let score = 0;
        let missed = 0;
        const bubbles = [];
        let last = performance.now();
        let spawnAcc = 0;

        function spawn() {
          const r = 14 + Math.random() * 22;
          bubbles.push({
            x: r + Math.random() * (canvas.clientWidth - 2 * r),
            y: canvas.clientHeight + r,
            r,
            vy: reduceMotion ? 0.35 : 0.55 + Math.random() * 0.55,
            hue: 200 + Math.random() * 80,
          });
        }

        function dist(ax, ay, bx, by) {
          const dx = ax - bx;
          const dy = ay - by;
          return Math.hypot(dx, dy);
        }

        function hit(clientX, clientY) {
          const rect = canvas.getBoundingClientRect();
          const x = clientX - rect.left;
          const y = clientY - rect.top;
          for (let i = bubbles.length - 1; i >= 0; i--) {
            const b = bubbles[i];
            if (dist(x, y, b.x, b.y) <= b.r + 6) {
              bubbles.splice(i, 1);
              score += 1;
              scoreEl.textContent = String(score);
              return;
            }
          }
        }

        canvas.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          hit(e.clientX, e.clientY);
        });

        function tick(now) {
          const dt = Math.min(32, now - last);
          last = now;

          spawnAcc += dt;
          const interval = reduceMotion ? 2200 : 900;
          while (spawnAcc >= interval) {
            spawnAcc -= interval;
            spawn();
          }

          const h = canvas.clientHeight;
          const w = canvas.clientWidth;
          for (let i = bubbles.length - 1; i >= 0; i--) {
            const b = bubbles[i];
            b.y -= b.vy * dt * 0.08;
            if (b.y < -b.r) {
              bubbles.splice(i, 1);
              missed += 1;
              missedEl.textContent = String(missed);
            }
          }

          ctx.clearRect(0, 0, w, h);
          for (const b of bubbles) {
            const grd = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1, b.x, b.y, b.r);
            grd.addColorStop(0, "hsla(" + b.hue + ",95%,96%,0.95)");
            grd.addColorStop(0.45, "hsla(" + b.hue + ",70%,78%,0.55)");
            grd.addColorStop(1, "hsla(" + b.hue + ",55%,45%,0.25)");
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fillStyle = grd;
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
